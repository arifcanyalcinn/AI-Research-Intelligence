# Alembic configuration file.
# The database URL is read from AppSettings at migration time (see arip/db/migrations/env.py).
# This file controls only Alembic's own behaviour, not the application DB URL.

[alembic]
script_location = arip/db/migrations

# Template for new migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for generated timestamps in migration files.
timezone = UTC

# sqlalchemy.url is intentionally left unset here.
# env.py reads it from AppSettings to avoid duplicating the URL.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
